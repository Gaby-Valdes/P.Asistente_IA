<!doctype html>
<html lang="fr">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Connexion Assistant AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='signup.css') }}">
</head>

<body>

    <div class="container form-container">
        <h2 class="text-center mb-2">Créer un compte</h2>
        <p class="text-center text-muted mb-4">Inscrivez-vous pour continuer</p>
        <form method="POST" action="/signup">
            <div class="row mb-3">

                <div class="col">
                    <input type="text" name="firstname" class="form-control" placeholder="Prenom">
                </div>
                <div class="col">
                    <input type="text" name="lastname" class="form-control" placeholder="Nom">
                </div>
            </div>
            <div class="form-floating mb-3">
                <input type="email" name="email" class="form-control" id="floatingInput" placeholder="nom@exemple.com">
                <label for="floatingInput">Adresse mail</label>
            </div>

            <div class="form-floating mb-3">

                <select class="form-select" name="niveau" id="floatingSelectGrid">
                    <option selected>Choisir le niveau</option>
                    <option value="B1">B1</option>
                    <option value="B2">B2</option>
                    <option value="B3">B3</option>
                    <option value="B4">B4 (MASTER)</option>
                    <option value="B5">B5 (MASTER)</option>
                </select>
                <label for="floatingSelectGrid">Niveau</label>
            </div>

            <div class="form-floating mb-3">
                <input type="password" name="password" class="form-control" id="floatingPassword"
                    placeholder="Password">
                <label for="floatingPassword">Mot de passe</label>
            </div>

            <!-- <div class="form-check mb-3">
<input class="form-check-input" type="checkbox" id="invalidCheck2" required>
<label class="form-check-label" for="invalidCheck2">
Agree to terms and conditions
</label>
</div>-->

            <button class="btn btn-primary w-100" type="submit">
                Créer le compte
            </button>
            <p class="text-center mt-3">
                Vous avez déjà un compte ? <a href="/login.html">Se connecter</a>
            </p>
        </form>
    </div>

</body>

</html>
