<!doctype html>
<html lang="fr">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Connexion Assistence AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
</head>

<body>

    </head>

    <body>
        <div class="card shadow login-card p-4">
            <h3 class="text-center mb-4">Connexion à l'IA</h3>

            <form method="POST" action="/login">
            <div class="mb-3">
                <label class="form-label">Adresse email</label>
                <input type="email" name="email" class="form-control" placeholder="Entrer votre email" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Mot de passe</label>
                <input type="password" name="password" class="form-control" placeholder="Entrer votre mot de passe"
                    required>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                Se connecter
            </button>
            
            </form>
            <div class="text-center mt-3">
                <p>Pas encore de compte ?
                    <a href="/signup">Créer un compte</a>
                </p>
            </div>

        </div>

    </body>

</html>
